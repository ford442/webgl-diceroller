<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU Dice Roller</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        overflow: hidden;
      }
      body {
        margin: 0;
      }
      #canvas-container {
        position: relative;
        width: 100%;
        height: 100%;
        max-width: 100vw;
        max-height: 100vh;
      }
      /* Optional centered square layout on large desktop pointers (?square forces this). */
      body.layout-square {
        display: flex;
        align-items: center;
        justify-content: center;
      }
      body.layout-square #canvas-container {
        width: min(100vw, 100vh, 1024px);
        height: min(100vw, 100vh, 1024px);
        aspect-ratio: 1 / 1;
      }
      #canvas-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay" style="position:fixed;inset:0;background:#111;color:#ccc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;">
      <div id="loading-text" style="font-size:1.5rem;margin-bottom:1rem;">Loading Tavern...</div>
      <div style="width:300px;height:8px;background:#333;border-radius:4px;">
        <div id="loading-bar" style="width:0%;height:100%;background:#ff9933;border-radius:4px;transition:width 0.2s;"></div>
      </div>
    </div>
    <div id="canvas-container"></div>
    <script>
      (function () {
        var params = new URLSearchParams(location.search);
        var square = params.has('square') || (
          !params.has('fill')
          && window.matchMedia('(min-width: 1024px) and (hover: hover) and (pointer: fine)').matches
        );
        if (square) document.body.classList.add('layout-square');
      })();
    </script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
