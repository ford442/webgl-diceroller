<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebGPU Dice Roller</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #0a0a0a;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #canvas-container {
        position: relative;
        width: min(100vmin, 1280px);
        height: min(100vmin, 1280px);
        max-width: 1280px;
        max-height: 1280px;
        aspect-ratio: 1 / 1;
      }
      #canvas-container canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <div id="loading-overlay" style="position:fixed;inset:0;background:#111;color:#ccc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;font-family:sans-serif;">
      <div id="loading-text" style="font-size:1.5rem;margin-bottom:1rem;">Loading Tavern...</div>
      <div style="width:300px;height:8px;background:#333;border-radius:4px;">
        <div id="loading-bar" style="width:0%;height:100%;background:#ff9933;border-radius:4px;transition:width 0.2s;"></div>
      </div>
    </div>
    <div id="canvas-container"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
